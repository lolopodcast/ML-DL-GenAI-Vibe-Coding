    {icon:"🎨",title:"擴散模型",body:"處理連續性數據（如像素）。運作核心是「破壞與重建」，從純粹雜訊中「去噪」精雕出符合文字描述的高保真圖像或影片，大幅降低視覺內容生成的邊際成本。"},
    {icon:"🌐",title:"多模態模型",body:"打破單一資料格式藩籬，將文字、圖像、音訊映射到共享的語意空間（Latent Space），模擬人類綜合感知能力，是高階教育與企業決策支援系統的核心基礎。"},
    {icon:"⚙️",title:"RLHF 訓練機制",body:"預訓練 → 指令微調（SFT）→ 人類回饋強化學習（RLHF），三層機制完美疊加。確保 LLM 輸出符合安全護欄與專業價值觀，是現代 AI 對齊的關鍵。"},
  ],
  m2_terms:[
    {front:"Transformer 架構",back:"LLM 的底層架構，利用「注意力機制（Attention）」理解序列中各元素的相互關係，是現代大型語言模型的基石。"},
    {front:"去噪（Denoising）",back:"擴散模型的核心操作：學習如何從加入雜訊的圖像中逐步還原清晰圖像，反向運行即可從純雜訊生成新圖像。"},
    {front:"潛在空間（Latent Space）",back:"多模態模型將不同形式的資料（文字、圖像）映射到同一個高維數學空間，使跨模態的語意對齊成為可能。"},
  ],
  m2_q:[
    {q:"LLM 的技術本質最接近哪種描述？",opts:["影像壓縮演算法","極度精準的序列預測器","動態規劃最佳化器","資料庫查詢引擎"],ans:1,exp:"LLM 基於 Transformer，其核心能力是預測下一個最可能出現的字詞，是一種高精度序列預測器。"},
    {q:"擴散模型生成圖像的核心原理是什麼？",opts:["從資料庫搜尋最相似的圖像","模仿人類手繪過程","從純雜訊中逐步去噪重建圖像","將文字直接轉換為像素"],ans:2,exp:"擴散模型先學習如何「加噪」，再反向學習「去噪」，最終能從純粹雜訊生成符合描述的圖像。"},
    {q:"多模態模型的核心突破在於？",opts:["更快的運算速度","將文字、圖像等不同模態映射到共享語意空間","更低的訓練成本","只使用文字資料"],ans:1,exp:"多模態模型透過對比學習，使不同模態的資料在同一個潛在空間中對齊，實現跨域理解。"},
    {q:"LLM 訓練的第二階段「指令微調（SFT）」的目的是？",opts:["建立基礎語言能力","教導模型遵循指令並正確回答問題","根據人類偏好優化輸出","降低運算成本"],ans:1,exp:"SFT 使用人類專家提供的高品質 Q&A 範例，訓練模型從「預測文字」升級為「遵循指令」。"},
    {q:"「RLHF（人類回饋強化學習）」在 LLM 訓練中的角色是？",opts:["提供初始訓練資料","建立語言理解能力","根據人類偏好評分調整模型使其符合價值觀","生成訓練圖像"],ans:2,exp:"RLHF 是 LLM 訓練的第三階段，讓模型根據人類對輸出品質的評分進行強化學習，確保安全與對齊。"},
    {q:"對比學習（Contrastive Learning）在多模態模型中的作用是？",opts:["讓模型更快收斂","強迫模型在數學空間中拉近語意相關的圖文，推遠無關的","降低模型大小","增加圖像解析度"],ans:1,exp:"對比學習訓練模型將「蘋果圖片」與「Apple」文字拉近，不相關組合推遠，建立跨模態對齊能力。"},
    {q:"GenAI 相較於傳統 ML 的最大典範差異是？",opts:["需要更多標記資料","從「收斂預測」走向「發散創造」","只能在特定硬體上運行","不需要任何訓練資料"],ans:1,exp:"傳統 ML 以分類預測為主，而 GenAI 能生成新內容，代表 AI 從「分析」到「創造」的典範轉移。"},
    {q:"自監督學習為何是 GenAI 大爆發的關鍵？",opts:["它不需要任何計算資源","它使模型能利用幾乎無限的無標籤數據建立先備知識","它比監督學習更準確","它只適用於文字處理"],ans:1,exp:"自監督學習讓模型自己創造訓練訊號，無需昂貴的人工標記，使吸收海量網路資料成為可能。"},

  m3_nav:"3. 前後端與 API",m3_title:"數位產品架構：前端、後端與 API 的協同運作",
  m3_p1:"任何現代化的數位產品，其底層架構皆可拆解為三個核心模組：前端（Front-end）、後端（Back-end）以及串接兩者的應用程式介面（API）。理解這三者的分工與協作，是掌握 Vibe Coding 的先決條件。",
  m3_p2:"API 的策略價值遠不止於技術串接。學會運用 API，等同於掌握了自動化獲取全球數據的鑰匙。透過 Python 腳本，可自動化向世界銀行、政府開放資料平台或金融數據庫呼叫 API，建立具備高度擴充性的結構資本。",
  m3_cards:[
    {icon:"🖥️",title:"前端（使用者介面）",body:"負責所有使用者看得到、摸得到的互動元素。開發者運用 HTML、CSS 與 JavaScript，將資料轉化為流暢的視覺排版與互動介面。如同實體店面的裝潢與服務動線，直接決定使用者黏著度。"},
    {icon:"⚙️",title:"後端（核心邏輯）",body:"隱藏在幕後的「營運引擎與物流倉儲」。包含伺服器的運算邏輯與資料庫的儲存管理。總體經濟數據爬取、會員登入驗證、複雜模型運算，皆在後端完成。"},
    {icon:"🔌",title:"API（應用程式介面）",body:"前端與後端之間的「服務窗口」。前端透過特定的網址（Endpoint）發送請求（Request），後端處理後以 JSON 格式回傳結果（Response）。是數位服務的標準化合約。"},
    {icon:"🌐",title:"Firebase（後端即服務）",body:"BaaS（Backend as a Service），提供隨插即用的資料庫、身分驗證與雲端儲存。讓你跳過底層基礎建設，直接將精力集中在產品價值的交付上。"},
  ],
  m3_terms:[
    {front:"API（應用程式介面）",back:"Application Programming Interface：定義不同軟體元件之間通訊方式的協議，讓前端能向後端請求服務，是現代網路服務的通用語言。"},
    {front:"JSON 格式",back:"JavaScript Object Notation：API 回傳資料的標準格式，以純文字表達結構化資料，人類可讀、機器易解析，是前後端溝通的通用貨幣。"},
    {front:"BaaS（後端即服務）",back:"Backend as a Service：雲端廠商提供現成後端功能（資料庫、驗證、儲存）的服務模式，大幅降低開發門檻，Firebase 是最典型的代表。"},
  ],
  m3_q:[
    {q:"在數位產品架構中，「前端」的主要職責是？",opts:["儲存與管理資料庫","提供使用者可見可互動的介面","處理所有商業邏輯運算","管理伺服器安全性"],ans:1,exp:"前端負責使用者介面與體驗，使用 HTML/CSS/JS 將資料轉化為視覺化的互動元素。"},
    {q:"API 在前後端協作中扮演什麼角色？",opts:["直接儲存資料","渲染網頁視覺元素","作為前後端之間的標準化溝通介面","管理伺服器硬體"],ans:2,exp:"API 定義了前後端溝通的規則，前端透過 API 請求服務，後端處理後以 JSON 回傳結果。"},
    {q:"Firebase 作為「後端即服務（BaaS）」的核心優勢是？",opts:["提供最快的前端渲染速度","讓開發者跳過後端基礎建設直接交付產品價值","自動生成前端介面","提供免費無限儲存空間"],ans:1,exp:"BaaS 讓開發者無需自行架設伺服器，直接使用現成的後端功能，大幅降低開發門檻。"},
    {q:"JSON 格式在 API 通訊中的作用是？",opts:["加密傳輸資料","作為前後端溝通的標準資料格式","提升網路傳輸速度","替代 HTML 進行頁面渲染"],ans:1,exp:"JSON 是 API 回傳資料的通用格式，結構清晰、人類可讀、機器易解析。"},
    {q:"學習運用 API 在企業策略分析上的核心價值是？",opts:["提升程式碼執行速度","自動化獲取世界銀行等全球資料，建立結構資本","降低伺服器租賃成本","替代人工智慧模型的訓練"],ans:1,exp:"API 讓策略分析師能自動化獲取全球即時數據，將分析流程整合為系統性的結構資本。"},
    {q:"「後端」在數位產品中最恰當的比喻是？",opts:["店面的裝潢設計","營運引擎與物流倉儲","顧客服務人員","廣告看板"],ans:1,exp:"後端包含所有幕後的運算邏輯與資料管理，如同維持企業運作的內部營運引擎。"},
    {q:"Firebase AI（Vertex AI for Firebase）讓開發者能做到什麼？",opts:["不需網路連線使用 AI","安全地將生成式 AI 能力整合進網頁應用","自動生成 API 文件","替代所有後端伺服器"],ans:1,exp:"Firebase AI 讓開發者能安全地在前端呼叫 Gemini 等模型，並透過 App Check 機制保護 API 金鑰。"},
    {q:"強化「結構資本（Structural Capital）」的最佳方式是？",opts:["增加員工人數","將自動化資料流程整合進專屬分析系統","購買更多硬體設備","延長員工工時"],ans:1,exp:"結構資本指組織的系統、流程與知識資產。將 API 整合的自動化流程系統化，即是有效提升結構資本。"},
  ],
  m4_nav:"4. Vibe Coding 工具鏈",m4_title:"AI Vibe Coding 時代：開發體驗的重塑",
  m4_p1:"傳統程式開發需要耗費大量心力記憶語法與除錯。然而，隨著大型語言模型（LLM）的突破，軟體工程正迎來一場典範轉移——「AI Vibe Coding」。在這種模式下，使用者只需以自然語言（如繁體中文或英文）向 AI 描述需求與意圖（Vibe），AI 便會自動撰寫完整的程式碼，讓非工程師背景的 PM、分析師、設計師，也能親手打造功能完整的數位產品。",
  m4_p2:"真正的競爭優勢不再是「誰寫程式寫得快」，而是誰具備強大的吸收能力（Absorptive Capacity）。吸收能力仰賴先備知識來同化、整合並應用新資訊。當你深刻理解前端、後端與 API 的系統架構，這份先備知識就能讓你精準駕馭各項 AI 開發工具。",
  m4_cards:[
    {icon:"🚀",title:"Cursor IDE（全域感知型）",body:"內建強大 AI 的程式碼編輯器，能讀懂整個專案脈絡。用自然語言下達指令，AI 直接在檔案中生成程式碼。適合從零到一建立架構，Ctrl+I 開啟全局生成功能。"},
    {icon:"🤝",title:"GitHub Copilot（穩定陪伴型）",body:"VSCode 內的強大擴充套件，具備「對話回退」功能。容錯率高，對初學者極度友善。若方向偏離，可利用對話回退重新引導，適合學習過程中的逐步探索。"},
    {icon:"🔥",title:"Firebase（無伺服器雲端後台）",body:"BaaS 平台，提供隨插即用的資料庫、身分驗證與雲端儲存。讓你跳過底層基礎建設的泥淖，直接將精力集中在產品價值的交付上。"},
    {icon:"🧠",title:"Firebase AI（智能大腦）",body:"將 AI 模型深度整合進 Firebase 生態系，安全且輕易地讓網頁具備生成式 AI 能力。可打造專屬 AI 助教，讀取資料庫中的教材並針對學生提問給予專業回饋。"},
    {icon:"🏢",title:"Vibe Coding 企業應用場景",body:"① 產銷人發財資：銷售漏斗儀表板、產線良率追蹤、HR 排班、研發進度看板、財務預測、庫存管理。② PM 製作 SPA MVP：以自然語言描述需求，讓 AI 生成互動原型，快速與工程師、利害關係人和潛在用戶溝通驗證。"},
  ],
  m4_terms:[
    {front:"Vibe Coding",back:"一種 AI 輔助開發模式：開發者專注於高階邏輯架構設計（Vibe），繁瑣的程式碼撰寫由 AI 代理完成，大幅降低技術門檻。"},
    {front:"吸收能力（Absorptive Capacity）",back:"組織或個人利用先備知識來識別、同化、整合並應用新資訊的能力。先備知識越深厚，對新技術的吸收效率越高。"},
    {front:"Prompt Engineering",back:"提示詞工程：精心設計輸入給 AI 的指令，以引導模型產出高品質、符合預期的輸出。包含角色、目標、視覺、技術、產出五大要素。"},

  m4_q:[
    {q:"「Vibe Coding」的核心概念是什麼？",opts:["由開發者撰寫所有程式碼","開發者專注高階設計，由 AI 代理撰寫程式碼","完全不需要人類參與","只使用開源工具"],ans:1,exp:"Vibe Coding 讓開發者聚焦在架構設計與邏輯定義，將繁瑣的程式碼生成交給 AI，大幅降低技術門檻。"},
    {q:"在 Cursor 中按下 Ctrl+I 的作用是？",opts:["儲存檔案","開啟全局 AI 生成功能（Composer）","切換深淺模式","執行程式碼"],ans:1,exp:"Ctrl+I 在 Cursor 中開啟 Composer，這是最強大的全局生成功能，可輸入自然語言指令生成完整程式碼。"},
    {q:"對初學者而言，GitHub Copilot 最重要的優勢是？",opts:["速度最快","「對話回退」功能讓探索過程容錯率高","免費無限使用","支援最多程式語言"],ans:1,exp:"Copilot 的對話回退功能允許學習者在方向偏離時重新引導，大幅降低初學者的試錯成本。"},
    {q:"Firebase 的 App Check 機制解決了什麼問題？",opts:["提升資料庫查詢速度","保護 API 金鑰不被前端惡意盜用","自動備份資料","提供 AI 模型訓練服務"],ans:1,exp:"App Check 確保只有授權網域才能呼叫 Firebase 服務，防止 API 金鑰被外部惡意使用。"},
    {q:"強大的「吸收能力（Absorptive Capacity）」仰賴什麼基礎？",opts:["大量的程式碼記憶","深厚的先備知識","高端的硬體設備","快速的網路連線"],ans:1,exp:"吸收能力仰賴先備知識。理解前後端與 API 等系統架構，才能精準駕馭 Cursor、Firebase 等 AI 工具。"},
    {q:"Firebase AI（Vertex AI for Firebase）最完美的應用場景是？",opts:["靜態網頁展示","打造能讀取教材資料庫並回應學生提問的 AI 助教","批次影像處理","即時串流影片"],ans:1,exp:"Firebase AI 結合 Firestore 資料庫，讓 AI 能讀取教材，打造具備先備知識的客製化 AI 助教。"},
    {q:"精心撰寫的 Prompt 通常應包含哪五大要素？",opts:["顏色、字體、大小、動畫、圖示","角色、目標、視覺、技術、產出","資料庫、API、前端、後端、測試","使用者、功能、期限、預算、平台"],ans:1,exp:"結構化的 Prompt 包含：角色設定、任務目標、視覺風格、功能技術、產出要求，引導 AI 生成高品質成果。"},
    {q:"在 Vibe Coding 時代，真正的競爭優勢是？",opts:["打字速度","記憶語法的能力","強大的吸收能力，能精準指揮 AI 工具","擁有最多的程式庫"],ans:2,exp:"在 AI 輔助開發時代，最有價值的能力是理解系統架構並精準指揮 AI 工具的吸收能力，而非語法記憶。"},

  m5_nav:"5. SPA 實作流程",m5_title:"SPA 實作流程：照表操課完成你的第一個網頁",
  m5_p1:"SPA（Single Page Application，單頁應用程式）本質上是純前端設計，由 HTML、CSS、JavaScript 構成，在單一 HTML 檔案中透過 JavaScript 動態更新內容。SPA 不包含後端的身分認證、資料庫存取或串接外部 API 等功能，但能完整呈現產品的互動介面與商業邏輯視覺化。對 PM 而言，SPA 是打造 MVP 的絕佳工具——可快速呈現架構設計，做為與內部工程師、外部潛在用戶溝通需求與驗證假設的高效媒介。",
  m5_p2:"除錯與迭代是學習的一部分，而非失敗的象徵。AI 偶爾也會犯錯，這時正是訓練「與 AI 協作」能力的最佳機會。掌握如何清晰描述問題、如何引導 AI 修正錯誤，本身就是最有價值的能力提升。",
  m5_steps:[
    {num:"01",title:"Step 1：下載並安裝 Cursor",desc:"前往 Cursor 官方網站下載並安裝。與 VSCode 介面高度相似，但內建更強大的 AI 輔助功能。"},
    {num:"02",title:"Step 2：帳號登入（Google/GitHub SSO）",desc:"開啟 Cursor 後，使用 Google 帳號或 GitHub 帳號快速登入，省去繁瑣的註冊流程。"},
    {num:"03",title:"Step 3：建立專案資料夾",desc:"在桌面建立空白資料夾 My_First_SPA，將其拖曳到 Cursor 開啟，即建立工作區。"},
    {num:"04",title:"Step 4：按下 Ctrl+I，喚醒 AI 助手",desc:"在 Cursor 介面按下 Ctrl+I（Mac：Cmd+I），開啟 Composer 全局生成功能。"},
    {num:"05",title:"Step 5：輸入結構化提示詞",desc:"將精心設計的「角色＋任務＋視覺＋技術＋產出」五要素 Prompt 貼入，按下 Enter。"},

  m1_nav:"1. ML Foundations",m1_title:"ML Foundations: From Logical Prediction to Dynamic Decision-Making",
  m1_p1:"Traditional programming relies on humans inputting 'data and explicit rules' to produce answers. Machine Learning (ML) instead inputs 'data and historical answers,' letting algorithms infer hidden rules on their own. This paradigm shift is the foundation of contemporary AI technology — and Deep Learning (DL), as its most powerful sub-field, uses multi-layer neural networks to automatically extract complex features.",
  m1_p2:"Based on data characteristics and learning goals, ML can be organized into three foundational architectures: supervised, unsupervised, and reinforcement learning. Each plays a different strategic role in enterprise operations. Deep Learning spans all three architectures as the core engine powering LLMs, diffusion models, and other GenAI applications.",
  m1_cards:[
    {icon:"📊",title:"Supervised Learning",body:"Trains on data with 'ground truth labels'. Ideal for supply chain yield prediction or targeted marketing. Drawback: the cost of manual data labeling is very high."},
    {icon:"🔍",title:"Unsupervised Learning",body:"Gives the model unlabeled raw data, letting it discover features and clusters independently. Excellent for macro environmental scanning, identifying undefined consumer segments."},
    {icon:"🎮",title:"Reinforcement Learning",body:"Uses trial-and-error and reward mechanisms to maximize cumulative reward in dynamic environments. Best for dynamic pricing, resource allocation, or algorithmic trading."},
    {icon:"🧠",title:"Deep Learning (DL)",body:"Uses multi-layer Artificial Neural Networks (ANN) to automatically extract abstract features layer by layer from raw data. The foundational engine behind LLMs, diffusion models, image recognition, and speech recognition."},
    {icon:"🔄",title:"Self-Supervised Learning",body:"The turning point for GenAI explosion. Models mask parts of data and predict the missing pieces — data itself is the label. Enables absorption of near-infinite internet data."},
  ],
  m1_terms:[
    {front:"Supervised Learning",back:"Training on labeled data where the model learns a mapping from inputs to outputs. Used for classification and regression tasks."},
    {front:"Deep Learning (DL)",back:"Multi-layer Artificial Neural Network architecture, mimicking brain neuron connections to automatically extract complex features layer by layer. The foundational engine of modern AI (LLMs, image recognition)."},
    {front:"Increasing Returns",back:"A virtuous cycle where AI systems grow stronger with more data and usage, creating a competitive moat that is hard for competitors to breach."},
  ],
  m1_q:[
    {q:"What is the fundamental difference between ML and traditional programming?",opts:["Requires more hardware resources","Inputs data and answers so algorithms infer the rules","Must use cloud services","Can only process text data"],ans:1,exp:"ML's core is letting machines learn rules from data, rather than humans explicitly writing rules."},
    {q:"Which scenario is supervised learning most suitable for?",opts:["Discovering unknown consumer segments","Finding patterns in unlabeled data","Supply chain yield prediction and targeted marketing","Strategy simulation in competitive games"],ans:2,exp:"Supervised learning relies on labeled data, making it ideal for classification and prediction tasks like supply chain yield prediction."},
    {q:"What is the core value of unsupervised learning?",opts:["Predict specific output labels","Discover hidden patterns and clusters from unlabeled data","Maximize long-term cumulative reward","Generate high-quality images"],ans:1,exp:"Unsupervised learning explores data structure without labels, suitable for discovering hidden business patterns."},
    {q:"Which enterprise scenario is reinforcement learning most suited for?",opts:["Spam email classification","Customer sentiment analysis","Dynamic pricing strategy formulation","Static report generation"],ans:2,exp:"Reinforcement learning finds optimal strategies through trial-and-error in dynamic environments, ideal for dynamic pricing."},
    {q:"What is the breakthrough of Self-Supervised Learning?",opts:["Requires large amounts of manually labeled data","Data itself is the label, enabling absorption of unlimited web data","Only usable for image generation","Must interact with a real environment"],ans:1,exp:"Self-supervised learning lets models predict masked data parts without manual labeling, enabling the GenAI explosion."},
    {q:"In enterprise strategy analysis, unsupervised learning can help with?",opts:["Predicting next quarter's stock price","Identifying undefined consumer segments","Auto-replying to customer service emails","Optimizing warehouse robot paths"],ans:1,exp:"Unsupervised learning excels at discovering hidden segments and patterns in complex data, ideal for exploratory market analysis."},
    {q:"Among the three ML architectures, which is best for simulating competitive game scenarios?",opts:["Supervised learning","Unsupervised learning","Reinforcement learning","Contrastive learning"],ans:2,exp:"Reinforcement learning, with its environment interaction and reward mechanisms, is best for simulating multi-party competitive dynamics."},
    {q:"'Increasing Returns' in AI refers to?",opts:["Hardware costs increase with scale","AI capabilities grow in a positive feedback loop with more data and usage","Training costs remain fixed","AI is only effective in specific domains"],ans:1,exp:"Increasing Returns means AI systems become more capable as usage and data grow, forming a competitive moat."},
  ],
  m2_nav:"2. GenAI Core Models",m2_title:"Three Core GenAI Models",
  m2_p1:"If traditional ML aims for 'convergence and prediction', GenAI moves toward 'divergence and creation'. Large Language Models, Diffusion Models, and Multimodal Models form the mainstream architecture of current AI applications, fundamentally reshaping content generation, visual creation, and cross-domain decision-making.",
  m2_p2:"The success of these three models relies on a training mechanism that fuses multiple learning strategies: self-supervised pre-training, Supervised Fine-Tuning (SFT), and Reinforcement Learning from Human Feedback (RLHF), forming an interlocking three-stage architecture.",
  m2_cards:[
    {icon:"💬",title:"LLM: Large Language Model",body:"Based on Transformer architecture, LLMs are highly precise 'sequence predictors'. They possess powerful semantic understanding, logical reasoning, and code generation capabilities, rapidly transforming enterprise intangible assets into interactive structural capital."},
    {icon:"🎨",title:"Diffusion Model",body:"Processes continuous data (like pixels). The core mechanism is 'destruction and reconstruction' — denoising from pure noise to produce high-fidelity images or videos matching text descriptions, drastically reducing marginal content creation costs."},
    {icon:"🌐",title:"Multimodal Model",body:"Breaks the barrier of single data formats by mapping text, images, and audio into a shared semantic space (Latent Space), simulating human comprehensive perception — the core foundation for advanced education and enterprise decision support."},
    {icon:"⚙️",title:"RLHF Training Mechanism",body:"Pre-training → Supervised Fine-Tuning (SFT) → Reinforcement Learning from Human Feedback (RLHF). Three layers perfectly stacked to ensure LLM outputs conform to safety guardrails and professional values — the key to modern AI alignment."},
  ],
  m2_terms:[
    {front:"Transformer Architecture",back:"The underlying architecture of LLMs, using an 'Attention Mechanism' to understand relationships between elements in a sequence. The cornerstone of modern large language models."},
    {front:"Denoising",back:"The core operation of diffusion models: learning to progressively restore clear images from noise-added versions. Running this in reverse generates new images from pure noise."},
    {front:"Latent Space",back:"Multimodal models map data of different forms (text, images) into the same high-dimensional mathematical space, enabling cross-modal semantic alignment."},
  ],
  m2_q:[
    {q:"Which description best captures the technical essence of LLMs?",opts:["Image compression algorithm","Highly precise sequence predictor","Dynamic programming optimizer","Database query engine"],ans:1,exp:"LLMs are built on Transformer architecture, and their core ability is predicting the next most likely word — a high-precision sequence predictor."},
    {q:"What is the core principle behind diffusion model image generation?",opts:["Searching a database for the most similar image","Imitating human hand-drawing process","Progressively denoising from pure noise to reconstruct images","Directly converting text into pixels"],ans:2,exp:"Diffusion models learn to add noise, then learn to reverse this process (denoise), enabling image generation from pure noise."},
    {q:"What is the core breakthrough of multimodal models?",opts:["Faster computation speed","Mapping text, images, and other modalities into a shared semantic space","Lower training costs","Using only text data"],ans:1,exp:"Multimodal models use contrastive learning to align different modalities in the same latent space, enabling cross-domain understanding."},
    {q:"What is the purpose of the second LLM training stage, 'Supervised Fine-Tuning (SFT)'?",opts:["Build foundational language capability","Teach the model to follow instructions and correctly answer questions","Optimize outputs based on human preferences","Reduce computational costs"],ans:1,exp:"SFT uses high-quality Q&A examples from human experts to train the model to upgrade from 'predicting text' to 'following instructions'."},
    {q:"What role does RLHF play in LLM training?",opts:["Provide initial training data","Build language understanding capability","Adjust model based on human preference scores to align with values","Generate training images"],ans:2,exp:"RLHF is the third LLM training stage, using human ratings of output quality to reinforce the model, ensuring safety and alignment."},
    {q:"What is the role of Contrastive Learning in multimodal models?",opts:["Make models converge faster","Force models to bring semantically related image-text pairs closer and push unrelated pairs apart in math space","Reduce model size","Increase image resolution"],ans:1,exp:"Contrastive learning trains models to pull 'apple picture' and 'Apple' text closer, push unrelated pairs apart, building cross-modal alignment."},
    {q:"What is the biggest paradigm shift of GenAI compared to traditional ML?",opts:["Requires more labeled data","Moves from 'convergent prediction' to 'divergent creation'","Can only run on specific hardware","Doesn't require any training data"],ans:1,exp:"Traditional ML focuses on classification and prediction, while GenAI can generate new content — representing AI's paradigm shift from 'analysis' to 'creation'."},
    {q:"Why is self-supervised learning key to the GenAI explosion?",opts:["It requires no computational resources","It enables models to use nearly unlimited unlabeled data to build prior knowledge","It is more accurate than supervised learning","It only applies to text processing"],ans:1,exp:"Self-supervised learning lets models create their own training signals without expensive manual labeling, enabling absorption of massive web data."},
  ],
  m3_nav:"3. Front-end, Back-end & API",m3_title:"Digital Product Architecture: Front-end, Back-end & API",
  m3_p1:"Any modern digital product can be decomposed into three core modules: Front-end, Back-end, and the Application Programming Interface (API) connecting them. Understanding how these three components divide work and collaborate is a prerequisite for mastering Vibe Coding.",
  m3_p2:"The strategic value of APIs goes far beyond technical connection. Learning to use APIs is equivalent to obtaining the key to automating access to global data. Through Python scripts, you can automatically call APIs from the World Bank, government open data platforms, or financial databases, building highly scalable structural capital.",
  m3_cards:[
    {icon:"🖥️",title:"Front-end (User Interface)",body:"Handles all interactive elements users can see and touch. Developers use HTML, CSS, and JavaScript to transform data into smooth visual layouts and interactive interfaces. Like a store's interior design and service flow — directly determines user stickiness."},
    {icon:"⚙️",title:"Back-end (Core Logic)",body:"The hidden 'operations engine and logistics warehouse'. Contains server computing logic and database storage management. Macro economic data crawling, member login verification, complex model computation — all happen in the back-end."},
    {icon:"🔌",title:"API (Application Interface)",body:"The 'service window' between front-end and back-end. Front-end sends requests via specific Endpoints; back-end processes and returns results in JSON format. The standardized contract of digital services."},
    {icon:"🌐",title:"Firebase (Backend as a Service)",body:"BaaS platform providing plug-and-play databases, authentication, and cloud storage. Lets you skip the infrastructure quagmire and focus your energy directly on delivering product value."},
  ],
  m3_terms:[
    {front:"API (Application Interface)",back:"Application Programming Interface: Defines how different software components communicate, enabling front-end to request services from back-end. The universal language of modern web services."},
    {front:"JSON Format",back:"JavaScript Object Notation: The standard data format for API responses. Represents structured data as plain text — human-readable and easily machine-parseable. The universal currency of front-back communication."},
    {front:"BaaS (Backend as a Service)",back:"A cloud service model where vendors provide ready-made backend functionality (databases, authentication, storage), greatly lowering the development barrier. Firebase is the most representative example."},
  ],
  m3_q:[
    {q:"In digital product architecture, what is the front-end's main responsibility?",opts:["Store and manage databases","Provide visible and interactive interfaces for users","Handle all business logic computation","Manage server security"],ans:1,exp:"The front-end is responsible for user interfaces and experiences, using HTML/CSS/JS to transform data into visual interactive elements."},
    {q:"What role does API play in front-back collaboration?",opts:["Directly stores data","Renders visual elements","Acts as a standardized communication interface between front-end and back-end","Manages server hardware"],ans:2,exp:"APIs define the rules for front-back communication: front-end requests services via API, back-end processes and returns JSON results."},
    {q:"What is the core advantage of Firebase as BaaS?",opts:["Provides the fastest front-end rendering","Lets developers skip backend infrastructure and deliver product value directly","Auto-generates front-end interfaces","Provides free unlimited storage"],ans:1,exp:"BaaS lets developers use ready-made backend functionality without setting up servers themselves, greatly lowering the development barrier."},
    {q:"What is the role of JSON format in API communication?",opts:["Encrypts data transmission","Serves as the standard data format for front-back communication","Improves network transmission speed","Replaces HTML for page rendering"],ans:1,exp:"JSON is the standard format for API responses — structured, human-readable, and easily machine-parseable."},
    {q:"What is the core business value of learning to use APIs for strategy analysis?",opts:["Improves code execution speed","Automates access to global data like World Bank, building structural capital","Reduces server rental costs","Replaces AI model training"],ans:1,exp:"APIs let strategy analysts automate access to global real-time data, building systematic structural capital from analysis workflows."},
    {q:"What is the most apt metaphor for the back-end in digital products?",opts:["Store interior design","Operations engine and logistics warehouse","Customer service staff","Advertising billboard"],ans:1,exp:"The back-end contains all behind-the-scenes computation logic and data management — like the internal operations engine of a business."},
    {q:"What does Firebase AI (Vertex AI for Firebase) enable developers to do?",opts:["Use AI without internet connection","Securely integrate generative AI capabilities into web apps","Auto-generate API documentation","Replace all backend servers"],ans:1,exp:"Firebase AI lets developers safely call Gemini models from the front-end, protected by App Check to prevent API key abuse."},
    {q:"What is the best way to strengthen 'Structural Capital'?",opts:["Increase headcount","Integrate automated data workflows into dedicated analysis systems","Purchase more hardware","Extend working hours"],ans:1,exp:"Structural capital refers to organizational systems, processes, and knowledge assets. Systematizing API-integrated automation workflows effectively builds structural capital."},
  ],
  m4_nav:"4. Vibe Coding Toolchain",m4_title:"AI Vibe Coding Era: Reshaping the Development Experience",
  m4_p1:"Traditional programming requires enormous effort to memorize syntax and debug. With the breakthrough of LLMs, a new paradigm has emerged — 'AI Vibe Coding'. Users simply describe their requirements in natural language (the Vibe), and AI agents automatically write the complete code. This empowers non-engineers — PMs, analysts, designers — to independently build fully functional digital products without writing a single line of code themselves.",
  m4_p2:"The true competitive advantage is no longer 'who codes faster' but who possesses strong Absorptive Capacity. Absorptive capacity relies on prior knowledge to assimilate, integrate, and apply new information. When you deeply understand front-end, back-end, and API system architecture, that prior knowledge enables you to precisely master AI development tools.",
  m4_cards:[
    {icon:"🚀",title:"Cursor IDE (Global Awareness)",body:"A code editor with powerful built-in AI that understands your entire project context. Use natural language commands and AI generates code directly in your files. Press Ctrl+I to open the global generation (Composer) feature."},
    {icon:"🤝",title:"GitHub Copilot (Stable Companion)",body:"A powerful VSCode extension with 'dialogue rollback' functionality. High fault tolerance, extremely beginner-friendly. If development goes off track, rollback and redirect — ideal for stepwise exploration during learning."},
    {icon:"🔥",title:"Firebase (Serverless Cloud Backend)",body:"BaaS platform providing plug-and-play databases, authentication, and cloud storage. Skip the infrastructure quagmire and focus your energy directly on delivering product value."},
    {icon:"🧠",title:"Firebase AI (Intelligent Brain)",body:"Deeply integrates AI models into the Firebase ecosystem, safely and easily giving web apps generative AI capabilities. Build a custom AI teaching assistant that reads course materials and provides professional feedback to students."},
    {icon:"🏢",title:"Vibe Coding Enterprise Use Cases",body:"① Sales & Ops: sales funnels, production yield, HR scheduling, R&D boards, financial summaries, inventory interfaces. ② PM builds SPA MVP: describe requirements in natural language, AI generates interactive prototypes for rapid validation with engineers, stakeholders, and users."},
  ],
  m4_terms:[
    {front:"Vibe Coding",back:"An AI-assisted development mode: developers focus on high-level logic architecture design (Vibe), while AI agents handle the tedious code writing, greatly lowering the technical barrier."},
    {front:"Absorptive Capacity",back:"An organization's or individual's ability to identify, assimilate, integrate, and apply new information based on prior knowledge. Deeper prior knowledge leads to higher efficiency in absorbing new technologies."},
    {front:"Prompt Engineering",back:"The art of designing instructions for AI to guide models toward high-quality, expected outputs. Includes five key elements: Role, Objective, Visual, Technical, and Output."},
  ],
  m4_q:[
    {q:"What is the core concept of 'Vibe Coding'?",opts:["Developer writes all code","Developers focus on high-level design, AI agents write the code","No human involvement needed","Only open-source tools are used"],ans:1,exp:"Vibe Coding lets developers focus on architecture and logic definition, delegating repetitive code generation to AI, greatly lowering the technical barrier."},

const LabPromptBuilder=({lang})=>{
  const presets=lang==='zh'?{
    role:['資深前端工程師','UI/UX 設計師','全端開發架構師','AI 應用開發工程師','自訂…'],

  }:{
    role:['Senior Front-end Engineer','UI/UX Designer','Full-stack Architect','AI App Developer','Custom…'],
    task:['Build RWD interactive learning SPA','Design business data dashboard','Develop bilingual learning platform','Build product landing page','Custom…'],
    style:['Minimalist business, BCG consulting','Modern tech, dark-themed','Warm, friendly educational','Professional presentation style','Custom…'],
    tech:['Single HTML, RWD, bilingual, dark mode','React + Tailwind with animations','Pure HTML/CSS/JS, no framework','Vue.js + Firebase integration','Custom…'],
    output:['Fully executable with comments','Clean code, easy to maintain','Include test cases & error handling','Include deployment guide','Custom…'],
  };
  const fieldKeys=['role','task','style','tech','output'];
  const fieldLabels=lang==='zh'?['角色','任務','視覺風格','技術需求','產出規格']:['Role','Task','Visual Style','Tech Needs','Output Spec'];
  const [vals,setVals]=useState({role:'',task:'',style:'',tech:'',output:''});
  const [custom,setCustom]=useState({role:false,task:false,style:false,tech:false,output:false});
  const handleSelect=(key,val)=>{
    if(val===presets[key][presets[key].length-1]){setCustom(c=>({...c,[key]:true}));setVals(v=>({...v,[key]:''}))}
    else{setCustom(c=>({...c,[key]:false}));setVals(v=>({...v,[key]:val}))}
  };
  const filled=fieldKeys.filter(k=>vals[k].trim()).length;
  const prompt=filled>0?fieldKeys.filter(k=>vals[k].trim()).map((k,i)=>`【${fieldLabels[i]}】${vals[k]}`).join(' '):'';
  const [copied,setCopied]=useState(false);
  const copyPrompt=()=>{if(!prompt)return;navigator.clipboard.writeText(prompt).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};
  return(
    <div className="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700 md:col-span-2">
      <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-1">{lang==='zh'?'Prompt 結構化建構器':'Structured Prompt Builder'}</h3>
      <p className="text-xs text-slate-400 mb-3">{lang==='zh'?'選擇預設選項或自訂，自動組合完整提示詞':'Choose presets or type custom — auto-assembles your full prompt'}</p>
      <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-2 mb-3">
        {fieldKeys.map((k,i)=>(
          <div key={k}>
            <div className="text-xs font-bold text-slate-500 mb-1">{fieldLabels[i]}</div>
            {!custom[k]?(
              <select value={vals[k]||''} onChange={e=>handleSelect(k,e.target.value)}
                className="w-full text-xs border border-slate-200 dark:border-slate-600 rounded px-2 py-1.5 bg-slate-50 dark:bg-slate-700 text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-1 focus:ring-[#004030] dark:focus:ring-[#D8C3A5]">
                <option value="">{lang==='zh'?'— 選擇 —':'— Select —'}</option>
                {presets[k].map((p,pi)=><option key={pi} value={p}>{p}</option>)}
              </select>
            ):(
              <div className="flex gap-1">
                <input autoFocus value={vals[k]} onChange={e=>setVals(v=>({...v,[k]:e.target.value}))}
                  placeholder={lang==='zh'?'自訂輸入…':'Type custom…'}
                  className="flex-1 min-w-0 text-xs border border-[#004030] dark:border-[#D8C3A5] rounded px-2 py-1.5 bg-slate-50 dark:bg-slate-700 text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-1 focus:ring-[#004030]"/>
                <button onClick={()=>setCustom(c=>({...c,[k]:false}))} className="text-xs px-1 text-slate-400 hover:text-red-400">✕</button>
              </div>
            )}
          </div>
        ))}
      </div>
      <div className="flex items-start gap-2">
        <div className="flex-1 bg-slate-100 dark:bg-slate-700 rounded-lg p-2.5 text-xs text-slate-600 dark:text-slate-300 min-h-[44px] leading-relaxed">
          {prompt||(lang==='zh'?'填入欄位後自動組合 Prompt…':'Fill in fields to auto-compose Prompt…')}
        </div>
        <div className="flex flex-col items-center gap-1 shrink-0">
          <div className={`text-lg font-black transition-all ${filled===5?'text-green-500':'text-slate-300'}`}>{filled}/5</div>
          {filled>0&&<button onClick={copyPrompt}
            className={`text-xs px-2 py-1 rounded font-bold transition-all ${copied?'bg-green-500 text-white':'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] hover:opacity-80'}`}>
            {copied?(lang==='zh'?'已複製✓':'Copied✓'):(lang==='zh'?'複製':'Copy')}
          </button>}
        </div>
      </div>
    </div>
  );
};

const ModuleQuiz=({questions,t,moduleId,onQuizSubmit})=>{
  const [indices]=useState(()=>{const a=[...Array(questions.length).keys()];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,4);});
  const [sel,setSel]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const [finalScore,setFinalScore]=useState(0);
  const score=submitted?finalScore:0;
  const submit=()=>{
    if(Object.keys(sel).length<indices.length)return;
    const s=indices.filter(i=>sel[i]===questions[i].ans).length;
    setFinalScore(s);
    setSubmitted(true);
    onQuizSubmit(moduleId,s,indices.length);
  };
  const retry=()=>{setSel({});setSubmitted(false);setFinalScore(0);};
  return(
    <div className="mt-8 border-t border-slate-200 dark:border-slate-700 pt-6">
      <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{t.quiz_title}</h3>
      <div className="space-y-5">
        {indices.map((qi,n)=>{
          const q=questions[qi];
          return(
            <div key={qi} className="bg-slate-50 dark:bg-slate-700/50 rounded-xl p-4">
              <p className="font-semibold text-slate-800 dark:text-slate-200 mb-3">{n+1}. {q.q}</p>
              <div className="space-y-2">
                {q.opts.map((opt,oi)=>{
                  let cls="w-full text-left px-4 py-2.5 rounded-lg border text-sm transition-all ";
                  if(!submitted){cls+=sel[qi]===oi?"border-[#004030] bg-[#004030]/10 dark:border-[#D8C3A5] dark:bg-[#D8C3A5]/10 font-semibold":"border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 hover:border-[#004030] dark:hover:border-[#D8C3A5]";}
                  else if(oi===q.ans)cls+="border-green-500 bg-green-50 dark:bg-green-900/30 font-semibold text-green-700 dark:text-green-300";
                  else if(sel[qi]===oi)cls+="border-red-400 bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400";
                  else cls+="border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 opacity-50";
                  return(<button key={oi} disabled={submitted} className={cls} onClick={()=>setSel({...sel,[qi]:oi})}>{opt}</button>);
                })}
              </div>
              {submitted&&<div className="mt-2 text-xs text-slate-500 dark:text-slate-400 italic">{t.explanation}: {q.exp}</div>}
            </div>
          );
        })}
      </div>
      <div className="mt-4 flex items-center gap-3 flex-wrap">
        {!submitted?
          <button onClick={submit} disabled={Object.keys(sel).length<indices.length}
            className="px-6 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 hover:bg-[#002b20] dark:hover:bg-white transition-all shadow-sm">
            {t.submit}
          </button>:
          <><div className="px-4 py-2 bg-[#004030]/10 dark:bg-[#D8C3A5]/10 rounded-lg font-bold text-[#004030] dark:text-[#D8C3A5]">
            {t.score}: {score}/{indices.length}
          </div>
          <button onClick={retry} className="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg text-sm hover:bg-slate-100 dark:hover:bg-slate-700 transition-all">{t.retry}</button></>}
      </div>
    </div>
  );
};

const LinkCard=({name,url,desc})=>(
  <a href={url} target="_blank" rel="noopener noreferrer"
    className="block p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all group">
    <div className="font-bold text-[#004030] dark:text-[#D8C3A5] group-hover:underline flex items-center gap-1">
      {name}<IconChevronRight size={14}/>
    </div>
    <div className="text-sm text-slate-500 dark:text-slate-400 mt-1">{desc}</div>
  </a>
);

/* ── Main App ── */
function App(){
  const [lang,setLang]=useState('zh');
  const [dark,setDark]=useState(false);
  const [module,setModule]=useState(0);
  const [menuOpen,setMenuOpen]=useState(false);
  const [voiceState,setVoiceState]=useState('stopped');
  const [autoTour,setAutoTour]=useState(false);
  const autoTourRef=useRef(false);
  const menuRef=useRef(null);
  const mainRef=useRef(null);

  // Password gate — ALL hooks must be declared before any conditional return
  const [unlocked,setUnlocked]=useState(false);
  const [pwInput,setPwInput]=useState('');
  const [pwError,setPwError]=useState(false);
  const [showPw,setShowPw]=useState(false);

  // Analytics
  const [analytics,setAnalytics]=useState(()=>{
    const base={totalTime:0,totalClicks:0};
    const mods={};
    for(let i=0;i<TOTAL;i++)mods[i]={time:0,clicks:0,correct:0,answered:0,total:8};
    return{...base,mods};
  });
  const [userInfo,setUserInfo]=useState({group:'G1',dept:'',id:'',name:''});
  const [m5Checked,setM5Checked]=useState([false,false,false,false,false,false]);
  const timerRef=useRef(null);
  const moduleStartRef=useRef(Date.now());

  const t=dict[lang];

  useEffect(()=>{
    document.documentElement.classList.toggle('dark',dark);
  },[dark]);

  useEffect(()=>{
    const click=(e)=>{
      if(menuRef.current&&!menuRef.current.contains(e.target))setMenuOpen(false);
    };
    document.addEventListener('mousedown',click);
    return()=>document.removeEventListener('mousedown',click);
  },[]);

  // Timer — only runs after unlock, but hook itself must always be declared
  useEffect(()=>{
    if(!unlocked) return;
    moduleStartRef.current=Date.now();
    clearInterval(timerRef.current);
    timerRef.current=setInterval(()=>{
      setAnalytics(a=>{
        const elapsed=Math.floor((Date.now()-moduleStartRef.current)/1000);
        const n={...a,mods:{...a.mods}};
        n.mods={...n.mods,[module]:{...n.mods[module],time:elapsed}};
        n.totalTime=Object.values(n.mods).reduce((s,m)=>s+m.time,0);
        return n;
      });
    },1000);
    if(mainRef.current)mainRef.current.scrollTo({top:0,behavior:'smooth'});
    return()=>clearInterval(timerRef.current);
  },[module,unlocked]);

  const trackClick=useCallback(()=>{
    setAnalytics(a=>{
      const n={...a,mods:{...a.mods}};
      n.mods={...n.mods,[module]:{...n.mods[module],clicks:n.mods[module].clicks+1}};
      n.totalClicks=n.totalClicks+1;
      return n;
    });
  },[module]);

  const handleQuizSubmit=useCallback((mid,correct,total)=>{
    setAnalytics(a=>{
      const n={...a,mods:{...a.mods}};
      n.mods={...n.mods,[mid]:{...n.mods[mid],correct,answered:total,total}};
      return n;
    });
  },[]);

  // Voice — all refs/state declared above, logic here
  const synth=window.speechSynthesis;
  const uttRef=useRef(null);
  const voiceTextRef=useRef('');
  const charIndexRef=useRef(0);

  const buildScript=useCallback(()=>{
    const cards=arr=>arr.map(c=>c.title+'. '+c.body).join('. ');
    const terms=arr=>arr.map(c=>c.front+': '+c.back).join('. ');
    const steps=arr=>arr.map(s=>s.title+'. '+s.desc).join('. ');
    if(module===0) return[t.m0_title,t.m0_intro,t.m0_why,t.m0_why_desc,
      t.m0_modules.map(m=>m.title+'. '+m.desc).join('. ')].join('. ');
    if(module===1) return[t.m1_title,t.m1_p1,t.m1_p2,cards(t.m1_cards),
      (lang==='zh'?'關鍵術語：':'Key Terms: ')+terms(t.m1_terms)].join('. ');
    if(module===2) return[t.m2_title,t.m2_p1,t.m2_p2,cards(t.m2_cards),
      (lang==='zh'?'關鍵術語：':'Key Terms: ')+terms(t.m2_terms)].join('. ');
    if(module===3) return[t.m3_title,t.m3_p1,t.m3_p2,cards(t.m3_cards),
      (lang==='zh'?'關鍵術語：':'Key Terms: ')+terms(t.m3_terms)].join('. ');
    if(module===4) return[t.m4_title,t.m4_p1,t.m4_p2,cards(t.m4_cards),
      (lang==='zh'?'關鍵術語：':'Key Terms: ')+terms(t.m4_terms)].join('. ');
    if(module===5) return[t.m5_title,t.m5_p1,t.m5_p2,steps(t.m5_steps),
      (lang==='zh'?'關鍵術語：':'Key Terms: ')+terms(t.m5_terms)].join('. ');
    if(module===6) return[t.m6_title,t.m6_desc,
      t.m6_sections.map(s=>s.title+'. '+s.items.map(i=>i.name+': '+i.desc).join('. ')).join('. ')].join('. ');
    return t.title;
  },[lang,module]);

  const speakFrom=(text,startChar)=>{
    synth.cancel();
    const slice=startChar>0?text.slice(startChar):text;
    const utt=new SpeechSynthesisUtterance(slice);
    utt.lang=lang==='zh'?'zh-TW':'en-GB';
    utt.rate=lang==='zh'?1.05:1.0;
    utt.onboundary=(e)=>{ charIndexRef.current=startChar+(e.charIndex||0); };
    utt.onend=()=>{ charIndexRef.current=0; setVoiceState('stopped'); };
    utt.onerror=()=>{ charIndexRef.current=0; setVoiceState('stopped'); };
    uttRef.current=utt;
    synth.speak(utt);
    setVoiceState('playing');
  };

  const playVoice=()=>{
    if(voiceState==='paused'){
      synth.resume();
      setTimeout(()=>{
        if(synth.paused||!synth.speaking) speakFrom(voiceTextRef.current,charIndexRef.current);
        else setVoiceState('playing');
      },120);
      return;
    }
    if(voiceState==='playing') return;
    const text=buildScript();
    voiceTextRef.current=text;
    charIndexRef.current=0;
    speakFrom(text,0);
  };
  const pauseVoice=()=>{ if(synth.speaking&&!synth.paused){synth.pause();setVoiceState('paused');} };
  const stopVoice=()=>{ synth.cancel();charIndexRef.current=0;setVoiceState('stopped');autoTourRef.current=false;setAutoTour(false); };
  useEffect(()=>{ if(!autoTourRef.current) stopVoice(); },[lang,module]);

  // Auto-tour: when a module finishes speaking, advance to next
  const startAutoTour=()=>{
    autoTourRef.current=true;
    setAutoTour(true);
    setModule(0);
    // speakFrom will be triggered by module change + useEffect below
  };
  const stopAutoTour=()=>{ stopVoice(); };

  // When autoTour is active and voice stops, move to next module
  const speakFromAuto=(text,startChar)=>{
    synth.cancel();
    const slice=startChar>0?text.slice(startChar):text;
    const utt=new SpeechSynthesisUtterance(slice);
    utt.lang=lang==='zh'?'zh-TW':'en-GB';
    utt.rate=lang==='zh'?1.05:1.0;
    utt.onboundary=(e)=>{ charIndexRef.current=startChar+(e.charIndex||0); };
    utt.onend=()=>{
      charIndexRef.current=0;
      if(autoTourRef.current){
        setModule(prev=>{
          const next=prev+1;
          if(next>=6){ autoTourRef.current=false; setAutoTour(false); setVoiceState('stopped'); return prev; }
          return next;
        });
      } else { setVoiceState('stopped'); }
    };
    utt.onerror=()=>{ charIndexRef.current=0; setVoiceState('stopped'); autoTourRef.current=false; setAutoTour(false); };
    uttRef.current=utt;
    synth.speak(utt);
    setVoiceState('playing');
  };

  // Trigger speech when module changes during auto-tour
  useEffect(()=>{
    if(autoTourRef.current&&module<=5){
      // Small delay to let content render
      const timer=setTimeout(()=>{
        const text=buildScript();
        voiceTextRef.current=text;
        charIndexRef.current=0;
        speakFromAuto(text,0);
      },800);
      return()=>clearTimeout(timer);
    }
  },[module]);

  // Password unlock handler
  const handleUnlock=()=>{
    if(pwInput==='proflolothebest'){setUnlocked(true);setPwError(false);}
    else{setPwError(true);setPwInput('');}
  };

  // ── PASSWORD GATE SCREEN (conditional render AFTER all hooks) ──
  if(!unlocked){
    const bgCls=dark?'bg-[#0a0a0a]':'bg-[#004030]';
    const cardCls=dark?'bg-slate-800 border border-slate-700':'bg-white';
    return(
      <div className={`min-h-screen flex flex-col items-center justify-center ${bgCls} font-sans px-4`}>
        {/* Top controls */}
        <div className="absolute top-4 right-4 flex gap-2">
          <button onClick={()=>setDark(!dark)}
            className="p-2 rounded-full bg-white/10 hover:bg-white/20 text-white transition-all">
            {dark?<IconSun size={16}/>:<IconMoon size={16}/>}
          </button>
          <button onClick={()=>setLang(lang==='zh'?'en':'zh')}
            className="px-3 py-1.5 rounded-full bg-white/10 hover:bg-white/20 text-white text-xs font-bold transition-all">
            {lang==='zh'?'EN':'中文'}
          </button>
        </div>
        <div className={`${cardCls} rounded-2xl shadow-2xl p-8 w-full max-w-sm`}>
          {/* Logo */}
          <div className="text-center mb-7">
            <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[#004030] mb-3 shadow-lg">
              <span className="font-serif font-black text-2xl text-[#D8C3A5] tracking-widest">VC</span>
            </div>
            <div className={`font-serif font-bold text-lg ${dark?'text-slate-100':'text-slate-800'}`}>
              {lang==='zh'?'Vibe Coding 互動學習指南':'Vibe Coding Learning Guide'}
            </div>
            <div className={`text-xs mt-1 ${dark?'text-slate-400':'text-slate-400'}`}>
              {lang==='zh'?'Interactive Learning SPA':'互動學習單頁應用程式'}
            </div>
          </div>

          {/* Password field */}
          <div className="space-y-3">
            <label className={`block text-xs font-bold uppercase tracking-wider ${dark?'text-slate-400':'text-slate-500'}`}>
              {lang==='zh'?'課程密碼':'Course Password'}
            </label>
            <div className="relative">
              <input
                type={showPw?'text':'password'}
                value={pwInput}
                onChange={e=>{setPwInput(e.target.value);setPwError(false);}}
                onKeyDown={e=>e.key==='Enter'&&handleUnlock()}
                placeholder={lang==='zh'?'請輸入密碼…':'Enter password…'}
                className={`w-full border-2 rounded-xl px-4 py-3 pr-12 focus:outline-none transition-all text-sm
                  ${dark?'bg-slate-700 text-slate-100 placeholder-slate-500':'bg-slate-50 text-slate-800 placeholder-slate-300'}
                  ${pwError?'border-red-400 shake':dark?'border-slate-600 focus:border-[#D8C3A5]':'border-slate-200 focus:border-[#004030]'}`}
                autoFocus
              />
              {/* Show/hide toggle */}
              <button
                type="button"
                onClick={()=>setShowPw(!showPw)}
                className={`absolute right-3 top-1/2 -translate-y-1/2 transition-colors ${dark?'text-slate-400 hover:text-slate-200':'text-slate-400 hover:text-slate-600'}`}
                title={lang==='zh'?(showPw?'隱藏密碼':'顯示密碼'):(showPw?'Hide':'Show')}>
                {showPw
                  ? <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                  : <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                }
              </button>
            </div>
            {pwError&&(
              <p className="text-red-500 text-xs font-semibold flex items-center gap-1">
                ❌ {lang==='zh'?'密碼錯誤，請重試':'Incorrect password, please try again'}
              </p>
            )}
            <button
              onClick={handleUnlock}
              className="w-full py-3 bg-[#004030] text-[#D8C3A5] font-serif font-black rounded-xl hover:bg-[#002b20] active:scale-95 transition-all shadow-lg text-sm uppercase tracking-wider">
              {lang==='zh'?'進入課程 →':'Enter Course →'}
            </button>
          </div>

          {/* Footer */}
          <div className={`mt-6 pt-4 border-t text-center ${dark?'border-slate-700':'border-slate-100'}`}>
            <p className={`text-[10px] ${dark?'text-slate-600':'text-slate-300'}`}>
              For Educational Use Only · Architect: Prof. Shihmin Lo
            </p>
          </div>
        </div>
      </div>
    );
  }

  const modulesList=[
    {icon:"📋",nav:t.m0_nav,idx:0},
    {icon:"📊",nav:t.m1_nav,idx:1},
    {icon:"💬",nav:t.m2_nav,idx:2},
    {icon:"🔌",nav:t.m3_nav,idx:3},
    {icon:"🚀",nav:t.m4_nav,idx:4},
    {icon:"🛠️",nav:t.m5_nav,idx:5},
    {icon:"🌐",nav:t.m6_nav,idx:6},
    {icon:"⚡",nav:t.mlab_nav,idx:7},
    {icon:"📈",nav:lang==='zh'?"8. 學習分析":"8. Analytics",idx:8},
  ];

  const exportCSV=()=>{
    const BOM='\uFEFF';
    const header=[t.analytics_module,t.analytics_time+'(s)',t.analytics_clicks,t.analytics_correct_ans_total].join(',');
    const rows=modulesList.slice(0,7).map(m=>{
      const d=analytics.mods[m.idx];
      const acc=d.answered>0?`${d.correct}/${d.answered}/${d.total}`:t.analytics_no_data;
      return[m.icon+m.nav,d.time,d.clicks,acc].join(',');
    });
    const meta=[`${t.analytics_group},${userInfo.group}`,`${t.analytics_dept},${userInfo.dept}`,`${t.analytics_id},${userInfo.id}`,`${t.analytics_name},${userInfo.name}`,`${t.analytics_total_time},${analytics.totalTime}s`,`${t.analytics_total_clicks},${analytics.totalClicks}`].join('\n');
    const csv=BOM+meta+'\n\n'+header+'\n'+rows.join('\n');
    const now=new Date();
    const ts=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
    const fname=`VC_${userInfo.group||'G'}_${userInfo.dept||'dept'}_${userInfo.name||'student'}_${ts}.csv`;
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=fname;a.click();
    URL.revokeObjectURL(url);
  };

  const overallAcc=(()=>{
    const answered=Object.values(analytics.mods).filter(m=>m.answered>0);
    if(!answered.length)return null;
    const total=answered.reduce((s,m)=>s+m.answered,0);
    const correct=answered.reduce((s,m)=>s+m.correct,0);
    return Math.round(correct/total*100);
  })();

  /* ── Render Modules ── */
  const renderM0=()=>(
    <div className="space-y-8 animate-fade-in">
      <div className="bg-[#004030] dark:bg-slate-800 rounded-2xl p-8 text-white relative overflow-hidden">
        <div className="absolute top-0 right-0 w-64 h-64 bg-[#D8C3A5]/10 rounded-full -mr-20 -mt-20 pointer-events-none"/>
        <div className="relative">
          <div className="inline-block bg-[#D8C3A5] text-[#004030] font-black text-xs px-3 py-1 rounded-full mb-4 tracking-widest uppercase">Vibe Coding</div>
          <h1 className="font-serif font-black text-3xl md:text-4xl text-white mb-3">{t.m0_title}</h1>
          <p className="text-[#D8C3A5]/90 max-w-2xl leading-relaxed">{t.m0_intro}</p>
          <button onClick={()=>setModule(1)}
            className="mt-6 px-6 py-3 bg-[#D8C3A5] text-[#004030] font-serif font-black rounded-lg hover:bg-white transition-all shadow-lg text-sm uppercase tracking-wider">
            {t.m0_start}
          </button>
        </div>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        {t.m0_stats.map((s,i)=>(
          <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700 text-center shadow-sm">
            <div className="font-serif font-black text-3xl text-[#004030] dark:text-[#D8C3A5]">{s.val}</div>
            <div className="text-xs text-slate-500 dark:text-slate-400 mt-1 uppercase tracking-wide">{s.label}</div>
          </div>
        ))}
      </div>
      <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
        <h2 className="font-serif font-bold text-xl text-[#004030] dark:text-[#D8C3A5] mb-1">{t.m0_why}</h2>
        <p className="text-slate-600 dark:text-slate-400 text-sm leading-relaxed mb-5">{t.m0_why_desc}</p>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {t.m0_modules.map((m,i)=>(
            <button key={i} onClick={()=>setModule(i+1)}
              className="text-left p-4 border border-slate-200 dark:border-slate-700 rounded-xl hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all group bg-slate-50 dark:bg-slate-700/50">
              <div className="flex items-center gap-3">
                <span className="font-black text-2xl text-[#004030]/30 dark:text-[#D8C3A5]/30 font-serif">{m.num}</span>
                <div>
                  <div className="font-bold text-[#004030] dark:text-[#D8C3A5] group-hover:underline">{m.title}</div>
                  <div className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">{m.desc}</div>
                </div>
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  const renderLearning=(mkey)=>{
    const md={
      1:{nav:t.m1_nav,title:t.m1_title,p1:t.m1_p1,p2:t.m1_p2,cards:t.m1_cards,terms:t.m1_terms,q:t.m1_q,icon:"📊"},
      2:{nav:t.m2_nav,title:t.m2_title,p1:t.m2_p1,p2:t.m2_p2,cards:t.m2_cards,terms:t.m2_terms,q:t.m2_q,icon:"💬"},
      3:{nav:t.m3_nav,title:t.m3_title,p1:t.m3_p1,p2:t.m3_p2,cards:t.m3_cards,terms:t.m3_terms,q:t.m3_q,icon:"🔌"},
      4:{nav:t.m4_nav,title:t.m4_title,p1:t.m4_p1,p2:t.m4_p2,cards:t.m4_cards,terms:t.m4_terms,q:t.m4_q,icon:"🚀"},
      5:{nav:t.m5_nav,title:t.m5_title,p1:t.m5_p1,p2:t.m5_p2,steps:t.m5_steps,terms:t.m5_terms,q:t.m5_q,icon:"🛠️"},
    }[mkey];
    return(
      <div className="space-y-6 text-lg leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
        <H2 icon={md.icon}>{md.nav}</H2>
        <p>{md.p1}</p>
        <p className="p-4 bg-slate-100 dark:bg-slate-800 rounded-lg italic font-serif text-base">{md.p2}</p>
        {md.cards&&(
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {md.cards.map((c,i)=>(
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm">
                <div className="text-3xl mb-2">{c.icon}</div>
                <div className="font-bold text-[#004030] dark:text-[#D8C3A5] mb-1">{c.title}</div>
                <p className="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">{c.body}</p>
              </div>
            ))}
          </div>
        )}
        {md.steps&&(
          <div className="space-y-3">
            {/* Thermometer progress bar */}
            {(()=>{
              const total=md.steps.length;
              const done=m5Checked.filter(Boolean).length;
              const pct=Math.round(done/total*100);
              const color=pct===100?'bg-green-500':pct>=50?'bg-[#004030] dark:bg-[#D8C3A5]':'bg-amber-400';
              return(
                <div className="mb-4">
                  <div className="flex justify-between items-center mb-1">
                    <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">{lang==='zh'?'完成進度':'Completion Progress'}</span>
                    <span className={`text-sm font-black ${pct===100?'text-green-500':'text-[#004030] dark:text-[#D8C3A5]'}`}>{done}/{total} {pct===100?'🎉':''}</span>
                  </div>
                  <div className="w-full h-4 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden border border-slate-200 dark:border-slate-600">
                    <div className={`h-full rounded-full transition-all duration-500 ${color} flex items-center justify-end pr-2`}
                      style={{width:`${pct}%`}}>
                      {pct>=15&&<span className="text-[10px] text-white font-bold">{pct}%</span>}
                    </div>
                  </div>
                  {pct===100&&<p className="text-xs text-green-600 dark:text-green-400 font-semibold mt-1 animate-fade-in">{lang==='zh'?'🎊 所有步驟完成！準備好開始你的 SPA 了！':'🎊 All steps done! Ready to build your SPA!'}</p>}
                </div>
              );
            })()}
            {md.steps.map((s,i)=>(
              <div key={i}
                className={`flex gap-4 rounded-xl p-4 border transition-all cursor-pointer select-none ${m5Checked[i]?'bg-green-50 dark:bg-green-900/20 border-green-400 dark:border-green-600':'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5]'}`}
                onClick={()=>setM5Checked(c=>{const n=[...c];n[i]=!n[i];return n;})}>
                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-sm shrink-0 transition-all ${m5Checked[i]?'bg-green-500 text-white':'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030]'}`}>
                  {m5Checked[i]?'✓':s.num}
                </div>
                <div className="flex-1 min-w-0">
                  <div className={`font-bold transition-all ${m5Checked[i]?'text-green-700 dark:text-green-400 line-through opacity-70':'text-[#004030] dark:text-[#D8C3A5]'}`}>{s.title}</div>
                  <p className="text-sm text-slate-600 dark:text-slate-400">{s.desc}</p>
                </div>
                <div className="shrink-0 flex items-center">
                  <div className={`w-5 h-5 rounded border-2 flex items-center justify-center transition-all ${m5Checked[i]?'bg-green-500 border-green-500 text-white':'border-slate-300 dark:border-slate-600'}`}>
                    {m5Checked[i]&&<span className="text-xs">✓</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
        <div className="mt-8">
          <h3 className="text-base font-bold uppercase tracking-wider text-slate-500 mb-4">{t.key_terms}</h3>
          <div key={`terms-${module}`} className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {md.terms.map((term,i)=><FlipCard key={i} front={term.front} back={term.back} t={t}/>)}
          </div>
        </div>
        <ModuleQuiz key={`quiz-${module}`} questions={md.q} t={t} moduleId={module} onQuizSubmit={handleQuizSubmit}/>
      </div>
    );
  };

  const renderResources=()=>(
    <div className="space-y-6 animate-fade-in">
      <H2 icon="🌐">{t.m6_nav}</H2>
      <p className="text-slate-600 dark:text-slate-400">{t.m6_desc}</p>
      {t.m6_sections.map((sec,i)=>(
        <div key={i}>
          <h3 className="font-bold text-[#004030] dark:text-[#D8C3A5] mb-3 uppercase tracking-wider text-sm">{sec.title}</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {sec.items.map((l,j)=><LinkCard key={j} {...l}/>)}
          </div>
        </div>
      ))}
      <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-5 border border-[#004030]/20 dark:border-[#D8C3A5]/20">
        <p className="text-sm text-slate-600 dark:text-slate-400">⚠️ {lang==='zh'?'以上連結為外部資源，請自行評估其適用性與最新性。本課程不對外部網站內容負責。':'Links above are external resources. Please evaluate their applicability and currency. This course is not responsible for external website content.'}</p>
      </div>
    </div>
  );

  const renderLab=()=>(
    <div className="space-y-6 animate-fade-in">
      <H2 icon="⚡">{t.mlab_nav}</H2>
      <p className="text-slate-600 dark:text-slate-400">{t.mlab_desc}</p>
      <div className="grid md:grid-cols-2 gap-4">
        <LabMLComparison lang={lang}/>
        <LabLLMTraining lang={lang}/>
      </div>
      <div className="grid md:grid-cols-2 gap-4">
        <LabAPIFlow lang={lang}/>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700">
          <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-3">{lang==='zh'?'Vibe Coding 典範轉移':'Vibe Coding Paradigm Shift'}</h3>
          <div className="space-y-2">
            {(lang==='zh'?[
              {old:"死背語法",new:"精準描述需求",arrow:"→"},
              {old:"獨自除錯",new:"引導 AI 協作修正",arrow:"→"},
              {old:"技術門檻高",new:"先備知識驅動",arrow:"→"},
              {old:"速度決定勝負",new:"吸收能力決定優勢",arrow:"→"},
            ]:[
              {old:"Memorize syntax",new:"Precisely describe needs",arrow:"→"},
              {old:"Debug alone",new:"Guide AI to fix collaboratively",arrow:"→"},
              {old:"High technical barrier",new:"Prior knowledge-driven",arrow:"→"},
              {old:"Speed wins",new:"Absorptive capacity wins",arrow:"→"},
            ]).map((row,i)=>(
              <div key={i} className="flex items-center gap-2 text-sm">
                <span className="text-red-400 line-through flex-1 text-right">{row.old}</span>
                <span className="text-[#004030] dark:text-[#D8C3A5] font-bold">{row.arrow}</span>
                <span className="text-green-600 dark:text-green-400 font-semibold flex-1">{row.new}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <LabPromptBuilder lang={lang}/>
    </div>
  );

  const renderAnalytics=()=>{
    const infoFilled=userInfo.dept&&userInfo.id&&userInfo.name;
    return(
      <div className="space-y-6 animate-fade-in">
        <H2 icon="📈">{lang==='zh'?"8. 學習歷程分析":"8. Learning Analytics"}</H2>
        <p className="text-slate-600 dark:text-slate-400">{t.analytics_desc}</p>
        <div className="grid grid-cols-3 gap-4">
          {[
            {val:analytics.totalTime+'s',label:t.analytics_total_time},
            {val:analytics.totalClicks,label:t.analytics_total_clicks},
            {val:overallAcc!==null?overallAcc+'%':'-',label:t.analytics_overall_acc},
          ].map((s,i)=>(
            <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center">
              <div className="font-serif font-black text-2xl text-[#004030] dark:text-[#D8C3A5]">{s.val}</div>
              <div className="text-xs text-slate-500 mt-1">{s.label}</div>
            </div>
          ))}
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
          <div className="grid grid-cols-4 bg-[#004030] text-white text-xs font-bold px-4 py-2">
            {[t.analytics_module,t.analytics_time,t.analytics_clicks,t.analytics_correct_ans_total].map((h,i)=><div key={i} className={i>0?'text-center':''}>{h}</div>)}
          </div>
          {modulesList.slice(0,7).map(m=>{
            const d=analytics.mods[m.idx];
            return(
              <div key={m.idx} className="grid grid-cols-4 px-4 py-2.5 border-t border-slate-100 dark:border-slate-700 text-sm hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                <div className="text-slate-700 dark:text-slate-300 text-xs">{m.icon} {m.nav}</div>
                <div className="text-center text-slate-500 text-xs">{d.time}{t.analytics_sec}</div>
                <div className="text-center text-slate-500 text-xs">{d.clicks}{t.analytics_times}</div>
                <div className="text-center text-xs font-medium text-[#004030] dark:text-[#D8C3A5]">{d.answered>0?`${d.correct}/${d.answered}/${d.total}`:t.analytics_no_data}</div>
              </div>
            );
          })}
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700">
          <h3 className="font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div>
              <label className="text-xs text-slate-500 mb-1 block">{t.analytics_group}</label>
              <select value={userInfo.group} onChange={e=>setUserInfo({...userInfo,group:e.target.value})}
                className="w-full text-sm border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 bg-slate-50 dark:bg-slate-700 text-slate-700 dark:text-slate-200">
                {t.group_options.map(g=><option key={g}>{g}</option>)}
              </select>
            </div>
            {[
              {key:'dept',label:t.analytics_dept,ph:t.analytics_dept_ph},
              {key:'id',label:t.analytics_id,ph:t.analytics_id_ph},
              {key:'name',label:t.analytics_name,ph:t.analytics_name_ph},
            ].map(f=>(
              <div key={f.key}>
                <label className="text-xs text-slate-500 mb-1 block">{f.label}</label>
                <input placeholder={f.ph} value={userInfo[f.key]} onChange={e=>setUserInfo({...userInfo,[f.key]:e.target.value})}
                  className="w-full text-sm border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 bg-slate-50 dark:bg-slate-700 text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-1 focus:ring-[#004030] dark:focus:ring-[#D8C3A5]"/>
              </div>
            ))}
          </div>
          <button onClick={infoFilled?exportCSV:null}
            className={`mt-4 w-full py-3 rounded-lg font-bold text-sm transition-all ${infoFilled?'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] hover:bg-[#002b20] dark:hover:bg-white shadow-md':'bg-slate-200 dark:bg-slate-700 text-slate-400 cursor-not-allowed'}`}>
            {infoFilled?t.analytics_export_csv:t.analytics_fill_required}
          </button>
        </div>
      </div>
    );
  };

  const renderContent=()=>{
    switch(module){
      case 0: return renderM0();
      case 1: case 2: case 3: case 4: case 5: return renderLearning(module);
      case 6: return renderResources();
      case 7: return renderLab();
      case 8: return renderAnalytics();
      default: return null;
    }
  };

  return(
    <div className="flex flex-col h-screen pt-16 font-sans">
      {/* Header */}
      <header className="fixed top-0 left-0 right-0 h-16 z-50 bg-[#004030] dark:bg-slate-900 border-b border-[#D8C3A5]/20 flex items-center px-4 gap-3 shadow-lg">
        {/* LEFT: Hamburger */}
        <div className="relative shrink-0" ref={menuRef}>
          <button onClick={()=>setMenuOpen(!menuOpen)}
            className="p-2 rounded-full text-[#D8C3A5]/70 hover:text-[#D8C3A5] transition-all">
            {menuOpen?<IconX size={20}/>:<IconMenu size={20}/>}
          </button>
          {menuOpen&&(
            <div className="absolute left-0 top-10 bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 w-60 z-[100] max-h-[calc(100vh-5rem)] overflow-y-auto">
              {modulesList.map(m=>(
                <button key={m.idx} onClick={()=>{setModule(m.idx);setMenuOpen(false);}}
                  className={`w-full text-left px-4 py-2.5 text-sm hover:bg-[#004030]/5 dark:hover:bg-[#D8C3A5]/5 transition-all flex items-center gap-2 ${module===m.idx?'font-bold text-[#004030] dark:text-[#D8C3A5] bg-[#004030]/5 dark:bg-[#D8C3A5]/5':'text-slate-700 dark:text-slate-300'}`}>
                  <span>{m.icon}</span><span>{m.nav}</span>
                  {module===m.idx&&<IconChevronRight size={12} className="ml-auto text-[#004030] dark:text-[#D8C3A5]"/>}
                </button>
              ))}
            </div>
          )}
        </div>
        {/* Brand */}
        <button onClick={()=>{ if(mainRef.current)mainRef.current.scrollTo({top:0,behavior:'smooth'}); }}
          className="font-serif font-black text-[#D8C3A5] tracking-widest text-lg shrink-0 hover:text-white transition-colors">{t.brand}</button>
        <div className="flex-1 min-w-0 hidden sm:block">
          <div className="text-white/70 text-xs truncate">{t.title}</div>
        </div>
        {/* Voice */}
        <div className="hidden md:flex items-center gap-1 border-r border-white/20 pr-3 mr-1">
          <button onClick={autoTour?stopAutoTour:playVoice} title={t.audio_read}
            className={`p-1.5 rounded-full transition-all ${voiceState==='playing'?'bg-[#D8C3A5] text-[#004030]':'text-[#D8C3A5]/70 hover:text-[#D8C3A5]'}`}>
            <IconPlay size={14}/>
          </button>
          <button onClick={pauseVoice} className={`p-1.5 rounded-full transition-all ${voiceState==='paused'?'bg-[#D8C3A5]/30 text-[#D8C3A5]':'text-[#D8C3A5]/70 hover:text-[#D8C3A5]'}`}><IconPause size={14}/></button>
          <button onClick={stopVoice} className="p-1.5 rounded-full text-[#D8C3A5]/70 hover:text-[#D8C3A5] transition-all"><IconSquare size={14}/></button>
          {/* Auto-tour button */}
          <button onClick={autoTour?stopAutoTour:startAutoTour}
            title={lang==='zh'?(autoTour?'停止全面導覽':'全面導覽（自動換頁）'):(autoTour?'Stop Full Tour':'Full Auto-Tour')}
            className={`px-2 py-1 rounded text-[10px] font-bold transition-all ml-1 ${autoTour?'bg-amber-400 text-slate-900 animate-pulse':'bg-[#D8C3A5]/20 text-[#D8C3A5]/70 hover:bg-[#D8C3A5]/40 hover:text-[#D8C3A5]'}`}>
            {autoTour?(lang==='zh'?'⏹ 停止':'⏹ Stop'):(lang==='zh'?'全覽':'Tour')}
          </button>
          {voiceState!=='stopped'&&<span className="text-[9px] text-[#D8C3A5]/60 ml-1">
            {autoTour?(lang==='zh'?`全覽 M${module}`:`Tour M${module}`):voiceState==='playing'?(lang==='zh'?'播放中':'Playing'):(lang==='zh'?'已暫停':'Paused')}
          </span>}
        </div>
        <button onClick={()=>setDark(!dark)} className="p-2 rounded-full text-[#D8C3A5]/70 hover:text-[#D8C3A5] transition-all shrink-0">
          {dark?<IconSun size={18}/>:<IconMoon size={18}/>}
        </button>
        <button onClick={()=>setLang(lang==='zh'?'en':'zh')}
          className="px-3 py-1 text-xs font-bold border border-[#D8C3A5]/30 text-[#D8C3A5] hover:bg-[#D8C3A5] hover:text-[#004030] rounded-full transition-all shrink-0">
          {lang==='zh'?'EN':'中'}
        </button>
      </header>

      {/* Body */}
      <div className="flex flex-1 min-h-0">
        {/* Sidebar */}
        <aside className="hidden md:block w-56 shrink-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-700 overflow-y-auto">
          {modulesList.map(m=>(
            <button key={m.idx} onClick={()=>{setModule(m.idx);trackClick();}}
              className={`w-full text-left px-4 py-3 text-sm hover:bg-[#004030]/5 dark:hover:bg-[#D8C3A5]/5 transition-all flex items-center gap-2 border-l-2 ${module===m.idx?'border-[#004030] dark:border-[#D8C3A5] font-bold text-[#004030] dark:text-[#D8C3A5] bg-[#004030]/5 dark:bg-[#D8C3A5]/5':'border-transparent text-slate-600 dark:text-slate-400'}`}>
              <span className="text-base">{m.icon}</span>
              <span className="leading-snug">{m.nav}</span>
            </button>
          ))}
        </aside>

        {/* Main */}
        <main ref={mainRef} className="flex-1 min-w-0 overflow-y-auto" onClick={trackClick}>
          <div className="p-4 sm:p-6 md:p-8 max-w-3xl mx-auto">
            {renderContent()}
            <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700">
              <button onClick={()=>setModule(Math.max(0,module-1))} disabled={module===0}
                className="px-5 py-2.5 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] disabled:opacity-0 uppercase text-xs tracking-wider flex items-center gap-1 transition-all">
                ← {t.nav_prev}
              </button>
              <button onClick={()=>setModule(Math.min(TOTAL-1,module+1))} disabled={module===TOTAL-1}
                className="px-7 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white disabled:opacity-0 uppercase text-xs tracking-wider shadow-md flex items-center gap-1 transition-all rounded-lg">
                {t.nav_next}<IconArrowRight size={14}/>
              </button>
            </div>
          </div>
        </main>
      </div>

      {/* Footer */}
      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs truncate">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-2 shrink-0">
          <span className="hidden sm:inline">Architect: <a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">{t.architect_name}</a></span>
          <button onClick={()=>{ if(mainRef.current)mainRef.current.scrollTo({top:0,behavior:'smooth'}); }} className="text-[#D8C3A5] hover:text-white font-bold cursor-pointer transition-colors">Top ↑</button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
